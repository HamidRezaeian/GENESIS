<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS — Neuromorphic Evolution</title>
    <meta name="description" content="Real-time observation deck for the GENESIS neuromorphic evolution simulator">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header id="topbar">
            <div class="topbar-left">
                <div class="status-dot" id="status-dot"></div>
                <h1>GENESIS</h1>
                <span class="tag">SNN ENGINE</span>
            </div>
            <div class="topbar-right">
                <div class="topbar-stat">
                    <span class="stat-label">TICK</span>
                    <span class="stat-value mono" id="val-tick">0</span>
                </div>
                <div class="topbar-stat">
                    <span class="stat-label">POP</span>
                    <span class="stat-value mono" id="val-pop">0<span class="dim">/600</span></span>
                </div>
                <div class="topbar-stat">
                    <span class="stat-label">EXT</span>
                    <span class="stat-value mono" id="val-ext">0</span>
                </div>
                <div class="topbar-stat">
                    <span class="stat-label">SPEED</span>
                    <span class="stat-value mono" id="val-speed">—</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="content">
            <!-- Left: RAM Canvas -->
            <section id="ram-section">
                <div class="section-head">
                    <h2>RAM Substrate</h2>
                    <div class="section-actions">
                        <button class="btn btn-ghost" id="btn-brain">Brain</button>
                        <button class="btn btn-ghost" id="btn-fullscreen">Expand</button>
                    </div>
                </div>
                <div class="canvas-frame" id="canvas-frame">
                    <canvas id="ramCanvas" width="256" height="256"></canvas>
                </div>
                <div class="legend-bar">
                    <span class="legend-item" data-type="energy"><i style="background:#34d399"></i>Energy</span>
                    <span class="legend-item" data-type="trap"><i style="background:#f43f5e"></i>Trap</span>
                    <span class="legend-item" data-type="ip"><i style="background:#60a5fa"></i>Organism</span>
                    <span class="legend-item" data-type="voice"><i style="background:#facc15"></i>Voice</span>
                    <span class="legend-item" data-type="book"><i style="background:#a78bfa"></i>Book</span>
                </div>
            </section>

            <!-- Right Column -->
            <aside id="sidebar">
                <!-- KPI Cards -->
                <div class="card-grid">
                    <div class="kpi-card">
                        <span class="kpi-label">Elite Age</span>
                        <span class="kpi-value mono" id="val-elite-age">0</span>
                    </div>
                    <div class="kpi-card">
                        <span class="kpi-label">Elite IQ</span>
                        <span class="kpi-value mono" id="val-elite-iq">0%</span>
                    </div>
                    <div class="kpi-card">
                        <span class="kpi-label">Avg Age</span>
                        <span class="kpi-value mono" id="val-avg-age">0</span>
                    </div>
                    <div class="kpi-card">
                        <span class="kpi-label">Refuges</span>
                        <span class="kpi-value mono" id="val-refuges">0</span>
                    </div>
                </div>

                <!-- Extinction Chart -->
                <div class="panel" id="chart-panel">
                    <div class="section-head"><h2>Era Lifespan</h2></div>
                    <div class="chart-wrap"><canvas id="extinctionChart"></canvas></div>
                </div>

                <!-- Environment Controls -->
                <div class="panel">
                    <div class="section-head"><h2>Environment</h2></div>
                    <div class="control-row">
                        <label class="control-label">Energy Rate</label>
                        <span class="mono" id="energy-rate-val">10.0%</span>
                    </div>
                    <input type="range" id="energy-rate-slider" class="slider" min="0" max="1000" value="100" step="1">
                </div>

                <!-- Library -->
                <div class="panel">
                    <div class="section-head"><h2>Library</h2></div>
                    <select id="library-select" class="select"><option value="">Loading…</option></select>
                    <button class="btn btn-primary btn-full" id="btn-inject-lib">Inject Curriculum</button>
                    <div class="input-row">
                        <input type="text" id="custom-book-input" class="input" placeholder="Custom text…">
                        <button class="btn btn-primary" id="btn-inject-custom">Inject</button>
                    </div>
                </div>

                <!-- Oracle Terminal -->
                <div class="panel terminal-panel">
                    <div class="section-head">
                        <h2>Oracle Terminal</h2>
                        <label class="check-label"><input type="checkbox" id="filter-success"> Success only</label>
                    </div>
                    <div class="terminal-output" id="term-out">
                        <div class="t-line t-sys">Listening for Elite Vocal Cords…</div>
                    </div>
                    <div class="terminal-input-row">
                        <span class="prompt">›</span>
                        <input type="text" class="terminal-input" id="term-in" placeholder="Broadcast…" autocomplete="off">
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Brain Modal -->
    <div id="brain-modal" class="modal hidden">
        <div class="modal-box">
            <div class="modal-head">
                <h2>Neural Topology</h2>
                <button class="btn btn-ghost" id="btn-close-modal">✕</button>
            </div>
            <div class="modal-body" id="brain-data">
                <div id="brain-stats"><p class="dim">Extracting Elite DNA from the Ark…</p></div>
                <svg id="brain-svg"></svg>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
