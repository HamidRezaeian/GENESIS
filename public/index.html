<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GENESIS | Quantum Substrate Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Background tectonic ambient glow -->
    <div id="ambient-glow" class="ambient-glow"></div>

    <main class="dashboard-container">
        <!-- Header -->
        <header class="glass-panel main-header">
            <div class="logo-area">
                <div class="status-indicator"></div>
                <h1>GENESIS</h1>
            </div>
            <div class="subtitle">ARTIFICIAL GENERAL INTELLIGENCE ENGINE</div>
        </header>

        <!-- Main Visualization (Center) -->
        <section class="visualization-container">
            <div class="canvas-wrapper">
                <canvas id="ramCanvas"></canvas>
            </div>
        </section>

        <!-- KPI Grid (Left) -->
        <aside class="kpi-panel glass-panel">
            <div class="kpi-card highlight-green">
                <div class="kpi-label">COMPUTATIONAL CYCLES</div>
                <div class="kpi-value" id="val-cycles">0</div>
                <div class="kpi-sparkline" id="spark-cycles"></div>
            </div>
            <div class="kpi-card highlight-orange">
                <div class="kpi-label">ACTIVE POPULATION</div>
                <div class="kpi-value" id="val-pop">0 <span class="dim">/ 4000</span></div>
            </div>
            <div class="kpi-card highlight-red">
                <div class="kpi-label">EXTINCTION EVENTS</div>
                <div class="kpi-value" id="val-extinctions">0</div>
            </div>
        </aside>

        <!-- Footer / Legend -->
        <footer class="glass-panel footer-legend">
            <div class="legend-item"><span class="swatch color-nop"></span> JUNK (NOP)</div>
            <div class="legend-item"><span class="swatch color-code"></span> LOGIC (CODE)</div>
            <div class="legend-item"><span class="swatch color-ip"></span> INSTRUCTION POINTER</div>
            <div class="legend-item"><span class="swatch color-hot"></span> HOT ZONE (HIGH VISCOSITY/RAD)</div>
            <div class="legend-item"><span class="swatch color-cold"></span> COLD ZONE</div>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
